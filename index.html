<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samard's Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <svg width="50" height="50" viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="24" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
                <text x="25" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">S</text>
            </svg>
        </div>
        <h1>Samard's Recipe Finder</h1>
    </header>
    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search by meal name (e.g., chicken curry)">
            <button id="search-btn">Search</button>
            <select id="category-dropdown">
                <option value="">All Categories</option>
                <!-- Categories will be populated by JS -->
            </select>
        </div>
        <div class="hero">
            <img src="https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Delicious meal" class="hero-image">
        </div>
        <div id="results" class="results-grid">
            <!-- Recipe cards will be inserted here -->
        </div>
    </main>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="meal-details">
                <!-- Meal details will be inserted here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
